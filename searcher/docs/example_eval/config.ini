[common]
n_of_workers = 2

[server]
host = 0.0.0.0
port = 80
files_storage_path = /stored_files

[eval.llm_options]
type = open_ai
base_url = http://llm_proxy.g:4000
model = default
api_key = $API_KEY
temperature = 0.1

[rag]
type = basic

[chat_requester]
type = simple

[chat_requester.options]
chat_provider_type = open_ai
base_url = http://llm_proxy.g:4000
model = default
api_key = $API_KEY
temperature = 0.1

[document_chunker]
type = langchain

[document_chunker.options]
chunker_name = recursive_character
chunk_size = 2048
chunk_overlap = 0

[document_parser]
type = auto

[document_store]
type = qdrant

[document_store.options]
location = http://qdrant.g:6333
collection_name = perovskites_plain_hybrid
force_recreate_collection = true

[document_store.options.vectorizer]
provider_type = open_ai
vectorizer_type = plain_hybrid
base_url = http://llm_proxy.g:4000
model = nomic-embed-text
api_key = $API_KEY
